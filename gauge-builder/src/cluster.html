<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Gauge Builder — Cluster</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #06080d;
      }
      html, body {
        margin: 0;
        height: 100%;
        background:
          radial-gradient(circle at 50% 0%, #0d1726 0%, transparent 60%),
          var(--bg);
        color: #e6e9ef;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        overflow: hidden;
        font-feature-settings: 'tnum';
      }
      #cluster {
        height: 100%;
        display: grid;
        grid-template-columns: 1fr 1.3fr 1fr;
        gap: 18px;
        padding: 24px;
      }
      .slot {
        position: relative;
      }
      .slot canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .slot .empty {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: #6c7a93;
        border: 1px dashed #1f2a44;
        border-radius: 18px;
      }
      .pill {
        position: fixed;
        top: 14px;
        left: 14px;
        background: rgba(15, 20, 33, 0.7);
        backdrop-filter: blur(6px);
        border: 1px solid #1f2a44;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        color: #6c7a93;
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }
      .dot {
        width: 7px; height: 7px; border-radius: 50%; background: #6c7a93;
      }
      .dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
      .dot.degraded { background: #f59e0b; }
      .dot.disconnected { background: #ef4444; }
    </style>
  </head>
  <body>
    <span class="pill"><span class="dot" id="conn-dot"></span><span id="conn-text">cluster · connecting…</span></span>
    <div id="cluster">
      <div class="slot" data-slot="0"><canvas></canvas><div class="empty">—</div></div>
      <div class="slot" data-slot="1"><canvas></canvas><div class="empty">—</div></div>
      <div class="slot" data-slot="2"><canvas></canvas><div class="empty">—</div></div>
    </div>
    <script type="module" src="./cluster.js"></script>
  </body>
</html>
