<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none" role="img" aria-label="WebView Doctor — car WebView & bridge diagnostic">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11182a"/>
      <stop offset="1" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="cyan" x1="180" y1="240" x2="560" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.34" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>

  <!-- faint baseline grid -->
  <g stroke="#1c2740" stroke-width="1" opacity="0.5">
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
  </g>

  <!-- Left: enlarged WebView + vitals + magnifier glyph -->
  <g transform="translate(150 196)">
    <rect x="0" y="0" width="372" height="268" rx="26" fill="#0f1626" stroke="#33405f" stroke-width="5"/>
    <line x1="0" y1="58" x2="372" y2="58" stroke="#33405f" stroke-width="5"/>
    <circle cx="34" cy="29" r="8.5" fill="#46557a"/>
    <circle cx="64" cy="29" r="8.5" fill="#46557a"/>
    <circle cx="94" cy="29" r="8.5" fill="#46557a"/>
    <polyline points="34,176 92,176 122,124 156,224 196,80 226,176 300,176"
              fill="none" stroke="url(#cyan)" stroke-width="13"
              stroke-linecap="round" stroke-linejoin="round"
              filter="url(#soft)" opacity="0.5"/>
    <polyline points="34,176 92,176 122,124 156,224 196,80 226,176 300,176"
              fill="none" stroke="url(#cyan)" stroke-width="11"
              stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(248 196)">
      <circle cx="40" cy="40" r="48" fill="#0b101c"/>
      <circle cx="40" cy="40" r="37" fill="none" stroke="url(#cyan)" stroke-width="11"/>
      <line x1="70" y1="70" x2="100" y2="100" stroke="url(#cyan)" stroke-width="16" stroke-linecap="round"/>
      <path d="M22 40 a18 18 0 0 1 36 0" fill="none" stroke="#e6f6fb" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Right: title + tagline + tag -->
  <g transform="translate(620 0)" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
    <text x="0" y="300" fill="#e6e9ef" font-size="82" font-weight="700" letter-spacing="-1">WebView Doctor</text>
    <rect x="2" y="326" width="118" height="6" rx="3" fill="url(#cyan)"/>
    <text x="0" y="382" fill="#9fb0c9" font-size="30" font-weight="500">Car WebView &amp; bridge diagnostic.</text>
    <text x="0" y="424" fill="#6c7a93" font-size="26">One tap → export the report → send it to support.</text>
    <text x="0" y="466" fill="#6c7a93" font-size="26">Privacy-clean: no VIN, location or account.</text>
    <g transform="translate(0 506)">
      <rect x="0" y="0" width="232" height="44" rx="22" fill="#131a2b" stroke="#2b3756" stroke-width="1.5"/>
      <circle cx="26" cy="22" r="6" fill="#22d3ee"/>
      <text x="44" y="30" fill="#9fb0c9" font-size="20" font-weight="600">i99dash · diagnostic</text>
    </g>
  </g>
</svg>
