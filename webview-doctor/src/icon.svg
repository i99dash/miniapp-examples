<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none" role="img" aria-label="WebView Doctor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141b2c"/>
      <stop offset="1" stop-color="#070a12"/>
    </linearGradient>
    <linearGradient id="cyan" x1="40" y1="96" x2="216" y2="168" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect width="256" height="256" rx="56" fill="url(#glow)"/>
  <rect x="2" y="2" width="252" height="252" rx="54" fill="none" stroke="#2b3756" stroke-width="2"/>

  <!-- Browser / WebView window -->
  <rect x="48" y="56" width="160" height="116" rx="14" fill="#0f1626" stroke="#33405f" stroke-width="3"/>
  <line x1="48" y1="84" x2="208" y2="84" stroke="#33405f" stroke-width="3"/>
  <circle cx="64" cy="70" r="4.5" fill="#46557a"/>
  <circle cx="80" cy="70" r="4.5" fill="#46557a"/>
  <circle cx="96" cy="70" r="4.5" fill="#46557a"/>

  <!-- Heartbeat / vitals trace (the diagnosis), with soft glow underlay -->
  <polyline points="60,132 86,132 100,108 116,150 134,96 148,132 168,132"
            fill="none" stroke="url(#cyan)" stroke-width="7"
            stroke-linecap="round" stroke-linejoin="round"
            filter="url(#soft)" opacity="0.55"/>
  <polyline points="60,132 86,132 100,108 116,150 134,96 148,132 168,132"
            fill="none" stroke="url(#cyan)" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Magnifier — inspect / diagnose -->
  <g transform="translate(150 140)">
    <circle cx="22" cy="22" r="26" fill="#0b101c"/>
    <circle cx="22" cy="22" r="20" fill="none" stroke="url(#cyan)" stroke-width="6"/>
    <line x1="38" y1="38" x2="54" y2="54" stroke="url(#cyan)" stroke-width="9" stroke-linecap="round"/>
    <path d="M12 22 a10 10 0 0 1 20 0" fill="none" stroke="#e6f6fb" stroke-width="3.5" stroke-linecap="round"/>
  </g>
</svg>
