<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>WebView Doctor</title>
    <link rel="icon" href="./icon.svg" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #06080d;
        --panel: #0f1421;
        --card: #161b2c;
        --line: #1f2a44;
        --text: #e6e9ef;
        --muted: #6c7a93;
        --accent: #22d3ee;
        --good: #22c55e;
        --warn: #f59e0b;
        --bad: #ef4444;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%;
        background: var(--bg); color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
        overflow: hidden;
      }
      #app { height: 100%; display: grid; grid-template-rows: auto auto 1fr auto; gap: 12px; padding: 16px; }
      header { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
      header .brand { font-weight: 600; letter-spacing: .4px; }
      header .sub { font-size: 12px; color: var(--muted); }
      .verdict {
        background: var(--panel); border: 1px solid var(--line); border-left: 4px solid var(--muted);
        border-radius: 12px; padding: 12px 14px; font-size: 14px; line-height: 1.45;
      }
      .verdict.good { border-left-color: var(--good); }
      .verdict.warn { border-left-color: var(--warn); }
      .verdict.bad  { border-left-color: var(--bad); }
      .verdict b { color: var(--text); }
      #report {
        width: 100%; height: 100%; resize: none;
        background: var(--card); color: var(--text);
        border: 1px solid var(--line); border-radius: 12px;
        padding: 12px 14px; font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
        font-size: 12px; line-height: 1.5; white-space: pre; overflow: auto;
      }
      footer { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      button {
        appearance: none; border: 1px solid var(--line); background: var(--card);
        color: var(--text); font-size: 14px; font-weight: 600;
        padding: 11px 18px; border-radius: 10px; cursor: pointer;
      }
      button.primary { background: var(--accent); color: #06080d; border-color: var(--accent); }
      button:active { transform: translateY(1px); }
      .hint { font-size: 12px; color: var(--muted); flex: 1; min-width: 180px; }
      .hint b { color: var(--text); }
      #status { font-size: 12px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <div><span class="brand">i99dash · WebView Doctor</span></div>
        <div class="sub" id="status">running diagnostics…</div>
      </header>

      <div class="verdict" id="verdict"><b>Diagnosing…</b> measuring WebView, host readiness and bridge.</div>

      <textarea id="report" readonly spellcheck="false" wrap="off">Collecting…</textarea>

      <footer>
        <button class="primary" id="dl">Export .txt</button>
        <button id="cp">Copy</button>
        <span class="hint">Then send the file to <b>i99dash support on Telegram</b>. No VIN / location / account is included.</span>
      </footer>
    </div>
    <script src="./app.bundle.js"></script>
  </body>
</html>
