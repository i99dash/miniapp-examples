<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weather Ahead</title>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────
       Two-color theme tracking the host's light/dark mode. CSS-only
       prefers-color-scheme fallback keeps the page legible during the
       first paint before the bridge resolves getContext(). */
    :root {
      color-scheme: light dark;
      --bg: #f0f4f8;
      --card: #ffffff;
      --border: #dde3ec;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #1565c0;
      --accent-2: #1976d2;
      --accent-soft: #dbeafe;
      --rain: #2196f3;
      --rain-soft: #bbdefb;
      --warn: #f59e0b;
      --cold: #7c3aed;
      --fog: #94a3b8;
      --sun: #f59e0b;
      --err: #dc2626;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1520;
        --card: #111e2f;
        --border: #1e3045;
        --text: #e2eaf5;
        --muted: #7a90a8;
        --accent: #60a5fa;
        --accent-2: #93c5fd;
        --accent-soft: #172340;
        --rain: #60a5fa;
        --rain-soft: #1e3a5f;
        --warn: #fbbf24;
        --cold: #a78bfa;
        --fog: #94a3b8;
        --sun: #fbbf24;
      }
    }
    [data-theme="dark"] {
      --bg: #0b1520;
      --card: #111e2f;
      --border: #1e3045;
      --text: #e2eaf5;
      --muted: #7a90a8;
      --accent: #60a5fa;
      --accent-2: #93c5fd;
      --accent-soft: #172340;
      --rain: #60a5fa;
      --rain-soft: #1e3a5f;
      --warn: #fbbf24;
      --cold: #a78bfa;
      --fog: #94a3b8;
      --sun: #fbbf24;
    }
    [data-theme="light"] {
      --bg: #f0f4f8;
      --card: #ffffff;
      --border: #dde3ec;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #1565c0;
      --accent-2: #1976d2;
      --accent-soft: #dbeafe;
      --rain: #2196f3;
      --rain-soft: #bbdefb;
      --warn: #f59e0b;
      --cold: #7c3aed;
      --fog: #94a3b8;
      --sun: #f59e0b;
      --err: #dc2626;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.4;
      min-height: 100vh;
    }
    [dir="rtl"] body {
      font-family: system-ui, -apple-system, "Tahoma", "Cairo", sans-serif;
    }

    /* ── Header ───────────────────────────────────────────────────
       City + current conditions. Compact on HU where vertical space
       is precious. Refresh button + timestamp live here, right-aligned
       so they don't distract from the conditions summary on the left. */
    header {
      padding: 12px 20px 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .header-left { flex: 1; min-width: 0; }
    header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-now {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }
    .now-temp {
      font-size: 28px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .now-icon { font-size: 28px; line-height: 1; }
    .now-condition { color: var(--muted); font-size: 14px; font-weight: 500; }
    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 200ms, color 200ms;
      white-space: nowrap;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .refresh-btn.loading { opacity: 0.55; pointer-events: none; }
    .refresh-btn .spin {
      display: inline-block;
      transition: transform 600ms ease;
    }
    .refresh-btn.loading .spin { animation: spin 700ms linear infinite; }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .last-updated {
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    /* ── Layout ───────────────────────────────────────────────────
       Single column → two columns on tablet → three-column HU
       landscape (exactly like islam-prayer): the three ahead-cards
       in a row across the top, the precip chart full-width below,
       and the detail strip at the bottom.

       The three ahead-cards all live inside `.ahead-row` which is
       a flex row with equal children. */
    main {
      padding: 8px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }
    .card-title {
      margin: 0 0 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    /* ── Ahead row: three cards T+30 / T+60 / T+90 ───────────────
       HU 1280×720: all three sit side-by-side in one row.
       Narrow screens: wrap. */
    .ahead-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ahead-card {
      flex: 1;
      min-width: 160px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ahead-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .ahead-icon { font-size: 40px; line-height: 1; }
    .ahead-temps {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }
    .ahead-temp-main {
      font-size: 28px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .ahead-temp-delta {
      font-size: 15px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .delta-neg { color: var(--cold); }
    .delta-pos { color: var(--sun); }
    .delta-zero { color: var(--muted); }
    .ahead-summary {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      line-height: 1.3;
      margin-top: 2px;
    }
    /* Highlight card if rain expected -->
    .ahead-card.rain-alert { border-color: var(--rain); }
    .ahead-card.fog-alert { border-color: var(--fog); }

    /* ── Precipitation timeline ───────────────────────────────────
       Pure SVG bar chart. 6 hours of 1h ticks. SVG is inline so JS
       can poke the bar heights directly without a framework. */
    .precip-card { }
    #precip-svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    /* ── Detail row ───────────────────────────────────────────────
       Wind / humidity / UV in a compact horizontal strip. One card
       with three sections separated by thin dividers. */
    .detail-row {
      display: flex;
      gap: 0;
    }
    .detail-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
      padding: 10px 8px;
    }
    .detail-item + .detail-item {
      border-inline-start: 1px solid var(--border);
    }
    .detail-icon { font-size: 22px; }
    .detail-value {
      font-size: 18px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }
    .detail-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Status / error strip ─────────────────────────────────────
       Location source indicator at the bottom of main. Same dot +
       text pattern as islam-prayer. -->
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 6px 14px 10px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .dot.live { background: var(--accent); animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text { font-size: 12px; color: var(--muted); }
    .status-text.err { color: var(--err); }
    .status-text.warn { color: var(--warn); }

    /* ── Loading / error overlay ──────────────────────────────────
       Full-card overlay during initial fetch. Fades out once data
       arrives. Avoids a jarring "flash of empty content". -->
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 99;
      transition: opacity 400ms ease;
    }
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-overlay p { color: var(--muted); font-size: 15px; }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 700ms linear infinite;
    }
  </style>
</head>
<body data-theme="auto">

  <!-- Full-screen loading overlay — hidden once first fetch completes. -->
  <div class="loading-overlay" id="loading-overlay" aria-live="polite" role="status">
    <div class="loading-spinner" aria-hidden="true"></div>
    <p id="loading-msg">Locating you…</p>
  </div>

  <!-- ── Header ──────────────────────────────────────────────────── -->
  <header>
    <div class="header-left">
      <h1 id="city-name">Weather Ahead</h1>
      <div class="header-now">
        <span class="now-icon" id="now-icon" aria-hidden="true">⏳</span>
        <span class="now-temp" id="now-temp">—°</span>
        <span class="now-condition" id="now-condition">Loading…</span>
      </div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" id="refresh-btn" type="button" aria-label="Refresh weather">
        <span class="spin" aria-hidden="true">↻</span>
        <span id="refresh-btn-label">Refresh</span>
      </button>
      <span class="last-updated" id="last-updated"></span>
    </div>
  </header>

  <main>
    <!-- Three ahead cards -->
    <div class="ahead-row" role="list" aria-label="Weather forecast">
      <article class="card ahead-card" id="ahead-30" role="listitem">
        <div class="ahead-label" id="ahead-30-label">T + 30 min</div>
        <div class="ahead-icon" id="ahead-30-icon" aria-hidden="true">⏳</div>
        <div class="ahead-temps">
          <span class="ahead-temp-main" id="ahead-30-temp">—</span>
          <span class="ahead-temp-delta" id="ahead-30-delta"></span>
        </div>
        <div class="ahead-summary" id="ahead-30-summary">—</div>
      </article>

      <article class="card ahead-card" id="ahead-60" role="listitem">
        <div class="ahead-label" id="ahead-60-label">T + 60 min</div>
        <div class="ahead-icon" id="ahead-60-icon" aria-hidden="true">⏳</div>
        <div class="ahead-temps">
          <span class="ahead-temp-main" id="ahead-60-temp">—</span>
          <span class="ahead-temp-delta" id="ahead-60-delta"></span>
        </div>
        <div class="ahead-summary" id="ahead-60-summary">—</div>
      </article>

      <article class="card ahead-card" id="ahead-90" role="listitem">
        <div class="ahead-label" id="ahead-90-label">T + 90 min</div>
        <div class="ahead-icon" id="ahead-90-icon" aria-hidden="true">⏳</div>
        <div class="ahead-temps">
          <span class="ahead-temp-main" id="ahead-90-temp">—</span>
          <span class="ahead-temp-delta" id="ahead-90-delta"></span>
        </div>
        <div class="ahead-summary" id="ahead-90-summary">—</div>
      </article>
    </div>

    <!-- Precipitation timeline chart -->
    <div class="card precip-card">
      <p class="card-title" id="precip-title">Precipitation — next 6 hours</p>
      <!-- SVG generated and updated by JS -->
      <svg id="precip-svg" viewBox="0 0 700 100" aria-label="Precipitation chart" role="img">
        <g id="precip-bars"></g>
        <g id="precip-labels"></g>
        <g id="precip-grid"></g>
      </svg>
    </div>

    <!-- Detail row: wind · humidity · UV -->
    <div class="card">
      <div class="detail-row">
        <div class="detail-item">
          <span class="detail-icon" aria-hidden="true">💨</span>
          <span class="detail-value" id="detail-wind">—</span>
          <span class="detail-label" id="detail-wind-label">km/h wind</span>
        </div>
        <div class="detail-item">
          <span class="detail-icon" aria-hidden="true">💧</span>
          <span class="detail-value" id="detail-humidity">—</span>
          <span class="detail-label" id="detail-humidity-label">humidity</span>
        </div>
        <div class="detail-item">
          <span class="detail-icon" aria-hidden="true">☀️</span>
          <span class="detail-value" id="detail-uv">—</span>
          <span class="detail-label" id="detail-uv-label">UV index</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Status strip -->
  <div class="status-row">
    <span class="dot" id="loc-dot"></span>
    <span class="status-text" id="loc-status">Locating…</span>
  </div>

  <div id="__boot_chip" style="position:fixed;bottom:4px;right:4px;z-index:99998;background:rgba(0,0,0,.6);color:#fff;font:11px monospace;padding:2px 6px;border-radius:3px">boot v0.6.4</div>
  <script src="./app.bundle.js"></script>
</body>
</html>
