<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Next.js Example — i99dash</title>
    <meta
      name="description"
      content="Reference mini-app. Demonstrates getContext, callApi, EN/AR + RTL, driving-state banner."
    />
    <link rel="icon" href="./assets/icon.svg" />
    <style>
      /* Ported verbatim from the old Next.js globals.css — this app
         used to be Next 15 (App Router). It was rebuilt as a single
         classic-IIFE bundle so it runs on the Di5.0 WebView (L5 /
         L5 Ultra / Song Plus), which silently won't execute the
         module/modern-chunk scripts Next emits. See i99dash-docs →
         Troubleshooting → "Mini-app blank on L5 … but works on L8". */
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #0a0a0a;
        --muted: #6b7280;
        --surface: #f3f4f6;
        --border: #e5e7eb;
        --warn-bg: #fef3c7;
        --warn-fg: #92400e;
        --success-bg: #dcfce7;
        --success-fg: #166534;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --fg: #fafafa;
          --muted: #9ca3af;
          --surface: #171717;
          --border: #262626;
          --warn-bg: #451a03;
          --warn-fg: #fde68a;
          --success-bg: #052e16;
          --success-fg: #bbf7d0;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family:
          system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px 16px 64px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 16px;
        font-weight: 600;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
      }
      .banner {
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 500;
      }
      .banner.warn {
        background: var(--warn-bg);
        color: var(--warn-fg);
      }
      .banner.success {
        background: var(--success-bg);
        color: var(--success-fg);
      }
      .hidden {
        display: none;
      }
      pre {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        font-size: 12px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .station {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
      }
      .station:last-child {
        border-bottom: 0;
      }
      .station-name {
        font-weight: 500;
      }
      .station-price {
        font-variant-numeric: tabular-nums;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Next.js mini-app</h1>

      <!-- Driving banner — hidden until the dev-server /_sdk/state
           poll returns a speed. In production that endpoint doesn't
           exist, so this stays hidden and the host's own safety gate
           takes over. -->
      <div id="banner" class="banner hidden"></div>

      <section class="card">
        <h2>context</h2>
        <pre id="context">loading…</pre>
      </section>

      <section class="card">
        <h2>fuel stations</h2>
        <div id="stations">loading…</div>
      </section>
    </main>

    <!-- Boot chip: renders from static HTML alone. If it's missing on
         device, the bundle never reached the WebView. Strip post-triage.
         (Documented L5 verification trick.) -->
    <div
      id="__boot_chip"
      style="position:fixed;bottom:4px;right:4px;z-index:99998;background:rgba(0,0,0,.6);color:#fff;font:11px monospace;padding:2px 6px;border-radius:3px"
    >
      boot v0.3.1
    </div>

    <!-- Classic IIFE bundle, no type=module — runs on the frozen
         Di5.0 Chromium WebView (L5) as well as Di5.1 (L8). -->
    <script src="./app.bundle.js"></script>
  </body>
</html>
