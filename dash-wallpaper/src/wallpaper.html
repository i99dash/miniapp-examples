<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Wallpaper</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        color: #fff;
        overflow: hidden;
      }
      body {
        position: relative;
      }
      /* #stage hosts the active wallpaper layer + the inset border
         overlay. Opacity is applied to #fill (the content) so the
         border stays at full strength even when the image is dimmed. */
      #stage {
        position: absolute;
        inset: 0;
      }
      #fill {
        position: absolute;
        inset: 0;
        opacity: var(--op, 1);
      }
      #fill > video,
      #fill > img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: var(--fit, cover);
        object-position: var(--posX, 50%) var(--posY, 50%);
        transform: scale(var(--zoom, 1));
        transform-origin: center;
      }
      #border {
        position: absolute;
        inset: 0;
        pointer-events: none;
        box-shadow: inset 0 0 0 var(--bw, 0px) var(--bc, transparent);
      }

      /* Built-in gradient presets (mirror the gallery thumbnails) */
      .preset-nebula {
        background: linear-gradient(135deg, #0f1c33, #1a0a3a, #4a0e6f);
      }
      .preset-aurora {
        background: linear-gradient(135deg, #001f1a, #024d4d, #00bfa5, #c8a8ff);
      }
      .preset-sunset {
        background: linear-gradient(135deg, #1a0838, #c52a4d, #ff8e3c, #ffd166);
      }
      .preset-neon-grid {
        background:
          linear-gradient(rgba(88, 199, 255, 0.15) 1px, transparent 1px) 0 0 / 24px 24px,
          linear-gradient(90deg, rgba(88, 199, 255, 0.15) 1px, transparent 1px) 0 0 / 24px 24px,
          linear-gradient(135deg, #0a0e16, #1a2848);
      }
      .preset-monochrome {
        background: linear-gradient(135deg, #000, #1a1a1a, #404040);
      }
      .preset-circuit {
        background:
          radial-gradient(at 20% 20%, rgba(88, 199, 255, 0.4), transparent 30%),
          radial-gradient(at 80% 80%, rgba(200, 168, 255, 0.3), transparent 30%), #0a0e16;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="fill"></div>
      <div id="border"></div>
    </div>
    <script>
      // Wallpaper renderer — picks one of three sources from the
      // route's query string and layers the editor's fit / zoom /
      // position / opacity / border on top:
      //
      //   ?preset=<name>             — gallery preset (CSS class)
      //   ?src=<dataUrl>&kind=image  — uploaded raster image
      //   ?src=<dataUrl>&kind=video  — uploaded video (auto-loop, muted)
      //   ?grad=<cssGradient>        — custom CSS gradient
      //
      // Edit overlays (all optional, defaulted in the editor):
      //   &fit=cover|contain|fill|none   image/video object-fit
      //   &zoom=50..300                  scale percent on the content
      //   &px=0..100  &py=0..100         object-position percent
      //   &op=0..100                     opacity of the fill layer
      //   &bw=0..40   &bc=RRGGBB         inset border width + colour
      //
      // Same content shape regardless of which screen this surface
      // is mounted on (head unit / passenger / cluster).
      (function () {
        var stage = document.getElementById('stage');
        var fill = document.getElementById('fill');
        var border = document.getElementById('border');
        var p = new URLSearchParams(location.search);

        // ── Edit params ───────────────────────────────────────
        var fit = p.get('fit') || 'cover';
        var zoom = clamp(parseInt(p.get('zoom'), 10), 50, 300, 100) / 100;
        var posX = clamp(parseInt(p.get('px'), 10), 0, 100, 50);
        var posY = clamp(parseInt(p.get('py'), 10), 0, 100, 50);
        var opacity = clamp(parseInt(p.get('op'), 10), 0, 100, 100) / 100;
        var bw = clamp(parseInt(p.get('bw'), 10), 0, 40, 0);
        var bcRaw = (p.get('bc') || '').replace(/[^0-9a-f]/gi, '').slice(0, 6);
        var bc = bcRaw.length === 6 ? '#' + bcRaw : '#000000';

        function clamp(n, lo, hi, dflt) {
          if (!isFinite(n)) return dflt;
          if (n < lo) return lo;
          if (n > hi) return hi;
          return n;
        }

        // Apply opacity / position / zoom / fit as CSS variables so
        // the same selectors above pick them up across image / video
        // / background-image rendering paths.
        fill.style.setProperty('--op', opacity);
        fill.style.setProperty('--fit', fit);
        fill.style.setProperty('--posX', posX + '%');
        fill.style.setProperty('--posY', posY + '%');
        fill.style.setProperty('--zoom', zoom);
        border.style.setProperty('--bw', bw + 'px');
        border.style.setProperty('--bc', bc);

        // ── Source ────────────────────────────────────────────
        var preset = p.get('preset');
        var src = p.get('src');
        var kind = p.get('kind');
        var grad = p.get('grad');

        if (preset) {
          fill.className = 'preset-' + preset;
          return;
        }
        if (grad) {
          fill.style.background = grad;
          return;
        }
        if (src && kind === 'image') {
          // Use a real <img> element so transform: scale composites
          // with object-fit/object-position the same way the editor
          // preview renders. Keeps editor and surface visually
          // identical, which matters for fine-grained pan adjustments.
          var img = document.createElement('img');
          img.src = src;
          fill.appendChild(img);
          return;
        }
        if (src && kind === 'video') {
          var v = document.createElement('video');
          v.src = src;
          v.muted = true;
          v.loop = true;
          v.autoplay = true;
          v.playsInline = true;
          fill.appendChild(v);
          return;
        }

        // Fallback — solid black with a hint
        fill.style.background = '#0a0e16';
        var hint = document.createElement('div');
        hint.textContent = 'No wallpaper source';
        hint.style.cssText =
          'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#6c7a93;font-family:system-ui,sans-serif;';
        fill.appendChild(hint);
      })();
    </script>
  </body>
</html>
