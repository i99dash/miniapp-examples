<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dash Wallpaper</title>
    <!--
      Sentry browser SDK — sync-loaded so it captures errors that
      fire before any in-page script runs (module-load syntax errors
      on older WebViews, unhandled rejections from the bridge dance).
      Per-trim filtering uses the tags set after `display.list()`
      resolves below.
    -->
    <script
      src="https://browser.sentry-cdn.com/8.40.0/bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script>
      if (typeof Sentry !== 'undefined') {
        Sentry.init({
          dsn: 'https://576526869e4b743b9f8a6e687d2d45fe@o4505563001520128.ingest.us.sentry.io/4511281579819008',
          release: 'dash-wallpaper@0.4.0',
          environment: 'production',
          // BrowserTracing + Replay add no value inside a sandboxed
          // mini-app WebView and would burn quota on noise.
          integrations: function (defaults) {
            return defaults.filter(function (i) {
              return i.name !== 'BrowserTracing' && i.name !== 'Replay';
            });
          },
          sendDefaultPii: false,
        });
        Sentry.getCurrentScope().setTags({
          'app.id': 'dash-wallpaper',
          'app.version': '0.4.0',
        });
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #050810;
        --bg-1: #0a0e16;
        --bg-2: #11192a;
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.16);
        --text-0: #e6e9ef;
        --text-1: #95a3b9;
        --text-2: #6c7a93;
        --accent: #58c7ff;
        --accent-2: #c8a8ff;
        --good: #b9f0c5;
        --warn: #f4a261;
        --err: #f0b9b9;
        --r-sm: 8px;
        --r-md: 12px;
        --r-lg: 16px;
      }

      * {
        box-sizing: border-box;
        -webkit-user-select: none;
        user-select: none;
      }
      input,
      textarea {
        -webkit-user-select: auto;
        user-select: auto;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background:
          radial-gradient(at 20% 20%, rgba(88, 199, 255, 0.05), transparent 50%),
          radial-gradient(at 80% 80%, rgba(200, 168, 255, 0.05), transparent 50%), var(--bg-0);
        color: var(--text-0);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        font-size: 15px;
        overflow: hidden;
      }

      .app {
        height: 100%;
        display: grid;
        grid-template-rows: auto auto auto 1fr auto auto;
        gap: 0;
      }

      /* ── Header ──────────────────────────────────────────────── */
      .header {
        padding: 14px 20px 10px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .pill {
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
        background: var(--bg-2);
        color: var(--text-1);
      }
      .pill.version {
        background: rgba(88, 199, 255, 0.1);
        color: var(--accent);
      }
      .header .spacer {
        flex: 1;
      }
      .status {
        font-size: 12px;
        color: var(--text-1);
      }
      .status .count {
        color: var(--accent);
        font-weight: 600;
      }

      /* ── Display picker ─────────────────────────────────────── */
      .targets {
        padding: 0 20px 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .chip {
        position: relative;
        padding: 10px 14px;
        border-radius: var(--r-md);
        background: var(--bg-2);
        border: 1px solid var(--border);
        cursor: pointer;
        transition:
          background 0.15s ease,
          border 0.15s ease,
          transform 0.15s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .chip:hover {
        border-color: var(--border-strong);
      }
      .chip.on {
        background: rgba(88, 199, 255, 0.12);
        border-color: var(--accent);
        color: var(--text-0);
      }
      .chip.disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .chip .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text-2);
        transition: background 0.15s ease;
      }
      .chip.on .dot {
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
      }
      .chip .name {
        font-size: 13px;
        font-weight: 500;
      }
      .chip .meta {
        font-size: 10px;
        color: var(--text-2);
        margin-left: 4px;
      }

      /* ── Tabs ───────────────────────────────────────────────── */
      .tabs {
        padding: 0 20px;
        display: flex;
        gap: 4px;
        border-bottom: 1px solid var(--border);
      }
      .tab {
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-1);
        cursor: pointer;
        background: none;
        border: 0;
        border-bottom: 2px solid transparent;
        transition: color 0.15s ease;
      }
      .tab:hover {
        color: var(--text-0);
      }
      .tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      /* ── Body ────────────────────────────────────────────────── */
      .body {
        overflow-y: auto;
        padding: 18px 20px 14px;
      }
      .panel {
        display: none;
      }
      .panel.active {
        display: block;
      }

      /* Gallery ------------------------------------------------- */
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
      }
      .preset {
        position: relative;
        aspect-ratio: 16 / 9;
        border-radius: var(--r-md);
        overflow: hidden;
        cursor: pointer;
        border: 2px solid transparent;
        transition: border 0.15s ease;
      }
      .preset.selected {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(88, 199, 255, 0.18);
      }
      .preset .thumb {
        position: absolute;
        inset: 0;
      }
      .preset .label {
        position: absolute;
        left: 8px;
        bottom: 8px;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 500;
      }

      /* Upload -------------------------------------------------- */
      .drop {
        border: 2px dashed var(--border-strong);
        border-radius: var(--r-md);
        padding: 36px 20px;
        text-align: center;
        cursor: pointer;
        transition:
          border 0.15s ease,
          background 0.15s ease;
      }
      .drop:hover,
      .drop.dragover {
        border-color: var(--accent);
        background: rgba(88, 199, 255, 0.04);
      }
      .drop .ic {
        font-size: 32px;
        color: var(--accent);
        margin-bottom: 8px;
      }
      .drop .hd {
        font-size: 15px;
        font-weight: 500;
        margin-bottom: 4px;
      }
      .drop .sub {
        font-size: 12px;
        color: var(--text-1);
      }
      .drop input[type='file'] {
        display: none;
      }
      .uploaded-preview {
        margin-top: 16px;
        border-radius: var(--r-md);
        overflow: hidden;
        aspect-ratio: 16 / 9;
        background: #000;
        position: relative;
        touch-action: none;
        cursor: grab;
      }
      .uploaded-preview.dragging {
        cursor: grabbing;
      }
      .uploaded-preview .thumb {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .uploaded-preview img,
      .uploaded-preview video {
        width: 100%;
        height: 100%;
        object-fit: var(--fit, cover);
        object-position: var(--posX, 50%) var(--posY, 50%);
        transform: scale(var(--zoom, 1));
        transform-origin: center;
        opacity: var(--op, 1);
        transition: opacity 0.12s ease;
        pointer-events: none;
      }
      .uploaded-preview .border-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        box-shadow: inset 0 0 0 var(--bw, 0px) var(--bc, transparent);
      }
      .uploaded-preview .pan-hint {
        position: absolute;
        top: 8px;
        right: 8px;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 10px;
        color: var(--text-1);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.18s ease;
      }
      .uploaded-preview:hover .pan-hint {
        opacity: 1;
      }

      /* Edit tools — fit/zoom controls inside the Upload tab */
      .edit-panel {
        margin-top: 14px;
        display: none;
      }
      .edit-panel.visible {
        display: block;
      }
      .edit-row {
        margin-bottom: 12px;
      }
      .edit-label {
        font-size: 12px;
        color: var(--text-1);
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .edit-label .val {
        margin-left: auto;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 11px;
        color: var(--text-2);
      }
      .fit-chips {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .fit-chip {
        padding: 8px 12px;
        font-size: 12px;
        background: var(--bg-2);
        color: var(--text-1);
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        cursor: pointer;
      }
      .fit-chip.on {
        background: rgba(88, 199, 255, 0.12);
        color: var(--accent);
        border-color: var(--accent);
      }
      .reset-btn {
        padding: 6px 10px;
        font-size: 11px;
        background: transparent;
        color: var(--text-2);
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        cursor: pointer;
        margin-left: auto;
      }
      .reset-btn:hover {
        color: var(--text-0);
        border-color: var(--border-strong);
      }

      /* Range slider — tap-friendly for in-car use */
      input[type='range'].slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 28px;
        background: transparent;
        cursor: pointer;
      }
      input[type='range'].slider::-webkit-slider-runnable-track {
        height: 6px;
        background: var(--bg-2);
        border-radius: 3px;
        border: 1px solid var(--border);
      }
      input[type='range'].slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 22px;
        height: 22px;
        margin-top: -9px;
        border-radius: 50%;
        background: var(--accent);
        border: 2px solid var(--bg-0);
        box-shadow: 0 0 0 1px var(--accent);
      }

      /* Style strip — opacity + border, applies to every wallpaper mode */
      .style-strip {
        padding: 12px 20px;
        border-top: 1px solid var(--border);
        background: rgba(10, 14, 22, 0.4);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .style-strip .col {
        min-width: 0;
      }
      .border-color-row {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      .bc-swatch {
        width: 22px;
        height: 22px;
        border-radius: 5px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: transform 0.1s ease;
      }
      .bc-swatch:active {
        transform: scale(0.9);
      }
      .bc-swatch.selected {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(88, 199, 255, 0.18);
      }

      /* Gradient ------------------------------------------------ */
      .gradient-preview {
        height: 140px;
        border-radius: var(--r-md);
        margin-bottom: 14px;
        border: 1px solid var(--border);
      }
      .swatch-row {
        margin-bottom: 14px;
      }
      .swatch-label {
        font-size: 12px;
        color: var(--text-1);
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .swatch-hex {
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 11px;
        color: var(--text-2);
      }
      .swatches {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 6px;
      }
      .swatch {
        aspect-ratio: 1 / 1;
        border-radius: 8px;
        cursor: pointer;
        border: 2px solid transparent;
        transition:
          transform 0.12s ease,
          border 0.12s ease;
      }
      .swatch:active {
        transform: scale(0.92);
      }
      .swatch.selected {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(88, 199, 255, 0.18);
      }
      .gradient-controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .gradient-btn {
        padding: 6px 10px;
        font-size: 12px;
        background: var(--bg-2);
        color: var(--text-1);
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        cursor: pointer;
      }
      .gradient-btn.on {
        background: rgba(88, 199, 255, 0.12);
        color: var(--accent);
        border-color: var(--accent);
      }

      /* ── Footer (apply bar) ──────────────────────────────────── */
      /* Driver-left layout (KSA / LHD): primary actions sit on the
         left edge so the driver's natural reach lands on Apply.
         Selection text fills to the right where it's read, not tapped. */
      .footer {
        padding: 12px 20px;
        border-top: 1px solid var(--border);
        background: rgba(10, 14, 22, 0.6);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .footer .selection {
        flex: 1;
        font-size: 12px;
        color: var(--text-1);
        text-align: right;
      }
      .footer .selection .ok {
        color: var(--good);
      }
      .footer button {
        padding: 14px 24px;
        font-size: 15px;
        font-weight: 600;
        border: 0;
        border-radius: var(--r-md);
        cursor: pointer;
        min-height: 52px;
        min-width: 120px;
      }
      .footer .clear {
        background: var(--bg-2);
        color: var(--text-1);
      }
      .footer .clear:hover {
        background: rgba(240, 185, 185, 0.1);
        color: var(--err);
      }
      .footer .apply {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: var(--bg-0);
      }
      .footer .apply:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg-2);
        border: 1px solid var(--border-strong);
        padding: 10px 18px;
        border-radius: var(--r-md);
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.2s ease;
        pointer-events: none;
        max-width: 80%;
        text-align: center;
      }
      .toast.show {
        opacity: 1;
      }
      .toast.err {
        border-color: var(--err);
        color: var(--err);
      }

      /* Built-in gradient presets */
      .preset[data-preset='nebula'] .thumb {
        background: linear-gradient(135deg, #0f1c33, #1a0a3a, #4a0e6f);
      }
      .preset[data-preset='aurora'] .thumb {
        background: linear-gradient(135deg, #001f1a, #024d4d, #00bfa5, #c8a8ff);
      }
      .preset[data-preset='sunset'] .thumb {
        background: linear-gradient(135deg, #1a0838, #c52a4d, #ff8e3c, #ffd166);
      }
      .preset[data-preset='neon-grid'] .thumb {
        background:
          linear-gradient(rgba(88, 199, 255, 0.15) 1px, transparent 1px) 0 0 / 24px 24px,
          linear-gradient(90deg, rgba(88, 199, 255, 0.15) 1px, transparent 1px) 0 0 / 24px 24px,
          linear-gradient(135deg, #0a0e16, #1a2848);
      }
      .preset[data-preset='monochrome'] .thumb {
        background: linear-gradient(135deg, #000, #1a1a1a, #404040);
      }
      .preset[data-preset='circuit'] .thumb {
        background:
          radial-gradient(at 20% 20%, rgba(88, 199, 255, 0.4), transparent 30%),
          radial-gradient(at 80% 80%, rgba(200, 168, 255, 0.3), transparent 30%), #0a0e16;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- ── Header ────────────────────────────────────────── -->
      <header class="header">
        <h1>Dash Wallpaper</h1>
        <span class="pill version">v0.1.4</span>
        <!-- Trim chip — populated from `display.list`'s `vehicle`
             field (host 1.6+). Hidden when the host doesn't supply
             one (older builds, dev runner). Helps users (and triagers)
             see which trim profile is active without opening
             developer tools. -->
        <span class="pill" id="trimPill" hidden></span>
        <span class="spacer"></span>
        <span class="status"><span class="count" id="targetCount">0</span> screens selected</span>
      </header>

      <!-- ── Display picker ────────────────────────────────── -->
      <div class="targets" id="targets">
        <!-- chips injected by JS once display.list resolves -->
      </div>

      <!-- ── Tabs ──────────────────────────────────────────── -->
      <div class="tabs">
        <button class="tab active" data-tab="gallery">Gallery</button>
        <button class="tab" data-tab="upload">Upload</button>
        <button class="tab" data-tab="gradient">Gradient</button>
      </div>

      <!-- ── Body ──────────────────────────────────────────── -->
      <div class="body">
        <!-- Gallery -->
        <div class="panel active" data-panel="gallery">
          <div class="gallery">
            <div class="preset" data-preset="nebula">
              <div class="thumb"></div>
              <span class="label">Nebula</span>
            </div>
            <div class="preset" data-preset="aurora">
              <div class="thumb"></div>
              <span class="label">Aurora</span>
            </div>
            <div class="preset" data-preset="sunset">
              <div class="thumb"></div>
              <span class="label">Sunset</span>
            </div>
            <div class="preset" data-preset="neon-grid">
              <div class="thumb"></div>
              <span class="label">Neon Grid</span>
            </div>
            <div class="preset" data-preset="monochrome">
              <div class="thumb"></div>
              <span class="label">Monochrome</span>
            </div>
            <div class="preset" data-preset="circuit">
              <div class="thumb"></div>
              <span class="label">Circuit</span>
            </div>
          </div>
        </div>

        <!-- Upload -->
        <div class="panel" data-panel="upload">
          <label class="drop" id="drop">
            <div class="ic">⬆</div>
            <div class="hd">Drag image or video — or tap to browse</div>
            <div class="sub">PNG / JPG / WebP / MP4 — up to 8&nbsp;MB</div>
            <input type="file" id="fileInput" accept="image/*,video/*" />
          </label>
          <div class="uploaded-preview" id="uploadedPreview" style="display: none">
            <div class="thumb" id="uploadedThumb"></div>
            <div class="border-overlay"></div>
            <div class="pan-hint">drag to position</div>
          </div>

          <!-- Edit tools — fit / zoom only; opacity + border live in
               the always-visible style strip so they apply to gallery
               + upload + gradient alike. -->
          <div class="edit-panel" id="editPanel">
            <div class="edit-row">
              <div class="edit-label">
                <span>Fit</span>
                <button class="reset-btn" id="resetEdit">Reset</button>
              </div>
              <div class="fit-chips" id="fitChips">
                <button class="fit-chip on" data-fit="cover">Cover</button>
                <button class="fit-chip" data-fit="contain">Contain</button>
                <button class="fit-chip" data-fit="fill">Stretch</button>
                <button class="fit-chip" data-fit="none">Original</button>
              </div>
            </div>

            <div class="edit-row">
              <div class="edit-label">
                <span>Zoom</span>
                <span class="val" id="zoomVal">100%</span>
              </div>
              <input type="range" class="slider" id="zoomSlider"
                     min="50" max="300" step="1" value="100" />
            </div>

            <div class="edit-row">
              <div class="edit-label">
                <span>Position</span>
                <span class="val" id="posVal">50% · 50%</span>
              </div>
              <div style="font-size: 11px; color: var(--text-2);">
                Drag the preview above to reposition.
              </div>
            </div>
          </div>
        </div>

        <!-- Gradient — tap-driven swatches (native <input type=color>
             doesn't open a picker in the IVI WebView). -->
        <div class="panel" data-panel="gradient">
          <div class="gradient-preview" id="gradPreview"></div>

          <div class="swatch-row">
            <div class="swatch-label">
              Start <span class="swatch-hex" id="gradC1Hex">#0f1c33</span>
            </div>
            <div class="swatches" id="gradC1Swatches"></div>
          </div>

          <div class="swatch-row">
            <div class="swatch-label">
              End <span class="swatch-hex" id="gradC2Hex">#c8a8ff</span>
            </div>
            <div class="swatches" id="gradC2Swatches"></div>
          </div>

          <div class="gradient-controls">
            <button class="gradient-btn on" data-angle="135">Diagonal</button>
            <button class="gradient-btn" data-angle="0">Top → Bottom</button>
            <button class="gradient-btn" data-angle="90">Left → Right</button>
            <button class="gradient-btn" data-angle="radial">Radial</button>
          </div>
        </div>
      </div>

      <!-- ── Style strip — opacity + border, applies to every mode ── -->
      <div class="style-strip">
        <div class="col">
          <div class="edit-label">
            <span>Opacity</span>
            <span class="val" id="opVal">100%</span>
          </div>
          <input type="range" class="slider" id="opSlider"
                 min="0" max="100" step="1" value="100" />
        </div>
        <div class="col">
          <div class="edit-label">
            <span>Border</span>
            <span class="val" id="bwVal">0px</span>
          </div>
          <input type="range" class="slider" id="bwSlider"
                 min="0" max="40" step="1" value="0" />
          <div class="border-color-row" id="bcSwatches" style="margin-top: 6px"></div>
        </div>
      </div>

      <!-- ── Footer ──────────────────────────────────────────
           Driver-left layout: Apply + Clear sit on the left edge for
           natural reach in LHD vehicles (KSA / GCC). Selection text
           fills the right side — read-only, doesn't need to be tapped. -->
      <footer class="footer">
        <button class="apply" id="apply" disabled>Apply</button>
        <button class="clear" id="clear">Clear</button>
        <span class="selection" id="selection">Pick a wallpaper above</span>
      </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script src="./app.bundle.js"></script>
  </body>
</html>
